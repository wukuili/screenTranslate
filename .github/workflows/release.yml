name: Build and Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0 or v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Normalize release version
        shell: pwsh
        run: |
          $tag = "${{ inputs.version }}".Trim()
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          $version = $tag.Substring(1)
          if (-not ($version -match '^\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$')) {
            throw "Invalid version '$version'. Use a semver value such as 0.1.0 or v0.1.0."
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: pwsh
        run: |
          $currentVersion = node -p "require('./package.json').version"
          if ($currentVersion -eq $env:PACKAGE_VERSION) {
            Write-Host "package.json is already at version $env:PACKAGE_VERSION; skipping npm version."
          } else {
            npm version $env:PACKAGE_VERSION --no-git-tag-version
          }

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: screen-translate-windows-${{ env.PACKAGE_VERSION }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Screen Translate ${{ env.RELEASE_TAG }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
